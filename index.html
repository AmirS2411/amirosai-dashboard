<html lang="en">
<head>

<title>🦞 AmirosAI Board</title>
<style>
  :root{--bg:#fafbfc;--bg2:#ffffff;--bg3:#f0f2f5;--border:#e1e4e8;
    --text:#1f2328;--muted:#656d76;--blue:#0969da;--green:#1a7f37;
    --yellow:#9a6700;--red:#cf222e;--purple:#8250df;--orange:#bc4c00;
    --accent:#667eea;--accent2:#764ba2;
    --radius:16px;--shadow:0 2px 8px rgba(0,0,0,.05)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;font-size:16px}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
    font-size:1rem;line-height:1.65;-webkit-font-smoothing:antialiased}
  /* Login */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
    background:linear-gradient(135deg,#667eea08,#764ba210);padding:20px}
  .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:36px 28px;text-align:center;box-shadow:var(--shadow);width:100%;max-width:380px}
  .login-box h1{font-size:1.4rem;font-weight:800;margin-bottom:6px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .login-box p{color:var(--muted);font-size:.875rem;margin-bottom:24px}
  .login-box input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;
    font-size:1rem;background:var(--bg3);color:var(--text);outline:none;margin-bottom:14px}
  .login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(102,126,234,.12)}
  .login-box button{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
  .login-err{color:var(--red);font-size:.8rem;margin-top:8px;min-height:20px}
  /* Dashboard */
  #dashboard{display:none}
  .top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;
    display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  .top-bar h1{font-size:1.1rem;font-weight:800;white-space:nowrap;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .ts{color:var(--muted);font-size:.7rem;white-space:nowrap}
  .main{max-width:680px;margin:0 auto;padding:16px}
  .quote{text-align:center;padding:12px 8px;color:var(--muted);font-style:italic;font-size:.85rem;margin-bottom:16px}
  /* Hero - today's entry */
  .hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .hero-date{font-size:.75rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .hero-tldr{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px;color:var(--text)}
  .hero-sections{display:grid;gap:20px}
  .hero-section{border-left:4px solid var(--border);padding:12px 0 12px 16px;
    background:var(--bg3);border-radius:0 12px 12px 0}
  .hero-section.work{border-color:var(--accent);background:#667eea08}
  .hero-section.learn{border-color:var(--purple);background:#8250df08}
  .hero-section.skills{border-color:var(--green);background:#1a7f3708}
  .hero-section.changes{border-color:var(--orange);background:#bc4c0008}
  .hero-section.improve{border-color:var(--yellow);background:#9a670008}
  .hero-section h4{font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.02em}
  .hero-section ul{list-style:none;padding:0}
  .hero-section li{font-size:.9rem;padding:6px 0;color:var(--text);line-height:1.5;
    border-bottom:1px solid rgba(0,0,0,.04)}
  .hero-section li:last-child{border-bottom:none}
  .hero-section li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--muted);margin-right:10px;vertical-align:middle;opacity:.5}
  /* Day cards */
  .day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
  .day-header{padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:8px;
    -webkit-tap-highlight-color:transparent}
  .day-header:active{background:var(--bg3)}
  .day-top-row{display:flex;align-items:center;justify-content:space-between}
  .day-date{font-weight:700;font-size:.9rem;color:var(--accent)}
  .day-chevron{color:var(--muted);font-size:.8rem;transition:transform .2s}
  .day-body.open ~ .day-header .day-chevron,.day-card .day-body.open+.x{}
  .day-tldr{font-size:.9rem;color:var(--text);line-height:1.5}
  .day-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tag{font-size:.7rem;padding:4px 10px;border-radius:8px;font-weight:600}
  .tag-work{background:#ddf4ff;color:var(--blue)}
  .tag-learn{background:#f0e6ff;color:var(--purple)}
  .tag-skills{background:#dafbe1;color:var(--green)}
  .tag-changes{background:#fff1e5;color:var(--orange)}
  .tag-improve{background:#fff8c5;color:var(--yellow)}

  .day-body{display:none;padding:4px 16px 20px;border-top:1px solid var(--border)}
  .day-body.open{display:block}
  /* Sections inside day cards */
  .section{margin-top:16px;border-left:4px solid var(--border);padding:12px 0 12px 16px;
    background:var(--bg3);border-radius:0 12px 12px 0}
  .section h4{font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:8px}
  .section ul{list-style:none;padding:0}
  .section li{font-size:.9rem;padding:6px 0;line-height:1.5;border-bottom:1px solid rgba(0,0,0,.04)}
  .section li:last-child{border-bottom:none}
  .section li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--muted);margin-right:10px;vertical-align:middle;opacity:.5}
  .section.work{border-color:var(--accent);background:#667eea08}
  .section.learn{border-color:var(--purple);background:#8250df08}
  .section.skills{border-color:var(--green);background:#1a7f3708}
  .section.changes{border-color:var(--orange);background:#bc4c0008}
  .section.improve{border-color:var(--yellow);background:#9a670008}
  .raw-toggle{font-size:.8rem;color:var(--accent);cursor:pointer;margin-top:16px;background:none;
    border:none;padding:8px 0;-webkit-tap-highlight-color:transparent}
  .raw-block{background:var(--bg3);border-radius:12px;padding:16px;font-size:.8rem;
    white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:8px;
    font-family:'SF Mono',ui-monospace,monospace;line-height:1.6;direction:auto;display:none;
    -webkit-overflow-scrolling:touch}
  /* Infrastructure */
  details.infra{margin-top:24px;margin-bottom:40px}
  details.infra>summary{cursor:pointer;padding:16px;background:var(--bg2);border:1px solid var(--border);
    border-radius:var(--radius);font-weight:600;font-size:.9rem;color:var(--muted);
    -webkit-tap-highlight-color:transparent}
  details.infra[open]>summary{border-radius:var(--radius) var(--radius) 0 0;border-bottom:none}
  details.infra>.infra-body{background:var(--bg2);border:1px solid var(--border);border-top:none;
    border-radius:0 0 var(--radius) var(--radius);padding:16px}
  .skill-tag{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:5px 12px;font-size:.75rem;display:inline-block;margin:3px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size:44px;margin-bottom:14px">🦞</div>
    <h1>AmirosAI Board</h1>
    <p>Your AI-powered command center</p>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Enter Mission Control</button>
    <div class="login-err" id="login-err"></div>
    <a href="#" id="forgot-link" onclick="showForgot(event)" style="display:block;margin-top:16px;color:var(--muted);font-size:12px;text-decoration:none">Forgot password?</a>
    <div id="forgot-panel" style="display:none;margin-top:12px;text-align:center">
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px">Enter your phone number for a hint:</p>
      <input type="tel" id="forgot-phone" placeholder="+972..." style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg3);color:var(--text);outline:none;margin-bottom:8px;direction:ltr;text-align:left">
      <button onclick="sendHint()" style="width:100%;padding:8px;background:var(--green);font-size:13px;border:none;color:#fff;border-radius:8px;cursor:pointer">Send Hint</button>
      <div id="forgot-msg" style="font-size:12px;margin-top:8px;min-height:18px"></div>
    </div>
  </div>
</div>

<div id="dashboard">
  <div class="top-bar">
    <span style="font-size:20px">🦞</span>
    <h1>AmirosAI Board</h1>
  </div>

  <div class="main">
    <div class="quote" id="quote"></div>

    <!-- Today hero -->
    <div id="today-hero"></div>

    <!-- Timeline -->
    <div id="timeline"></div>

    <!-- Infrastructure -->
    <details class="infra">
      <summary>⚙️ System Infrastructure</summary>
      <div class="infra-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;font-size:13px">

          <div><strong>Resources</strong><div id="resources" style="margin-top:6px"></div></div>
        </div>
        <div style="margin-bottom:12px"><strong id="skills-title">Skills</strong></div>
        <div id="skills-list" style="margin-bottom:16px"></div>
      </div>
    </details>
  </div>
</div>

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function tryLogin(){const p=document.getElementById('pwd-input').value;if(await sha256(p)===HASH){sessionStorage.setItem('amirosai_auth','1');document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';renderAll(DATA)}else{document.getElementById('login-err').textContent='❌ Incorrect password';document.getElementById('pwd-input').value=''}}
function showForgot(e){e.preventDefault();document.getElementById('forgot-panel').style.display='block';document.getElementById('forgot-link').style.display='none'}
function sendHint(){const p=document.getElementById('forgot-phone').value.trim().replace(/[\s\-()]/g,''),m=document.getElementById('forgot-msg');if(!p.match(/^\+?\d{10,15}$/)){m.textContent='❌ Invalid number';m.style.color='var(--red)';return}if(!['+972544222178','+972537730771'].some(n=>p.endsWith(n.replace('+','')))){m.textContent='❌ Not authorized';m.style.color='var(--red)';return}m.textContent='✅ Hint: your name + the year we started 🦞';m.style.color='var(--green)'}
if(sessionStorage.getItem('amirosai_auth')==='1'){document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block'}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

const SEC_CONFIG = {
  tasks:   {icon:'🔨', title:'What We Did Today',        cls:'work',    tag:'tag-work',    tagLabel:'work'},
  learnings:{icon:'🧠', title:'What I Learned Today',     cls:'learn',   tag:'tag-learn',   tagLabel:'learned'},
  skills_added:{icon:'⚡', title:'Skills & Tools Added',  cls:'skills',  tag:'tag-skills',  tagLabel:'skills'},
  changes: {icon:'🔄', title:'Changes & Decisions Made',  cls:'changes', tag:'tag-changes',  tagLabel:'changes'},
  improve: {icon:'📈', title:'How to Improve Tomorrow',   cls:'improve', tag:'tag-improve',  tagLabel:'improve'},
};

function buildSections(log){
  const s = log.sections||{};
  const out = {};
  out.tasks = s.tasks||[];
  out.learnings = s.learnings||[];
  out.skills_added = s.skills_added||[];
  out.changes = [...(s.decisions||[]), ...(s.changes||[])];
  out.improve = s.improve||s.improvements||[];
  // Fallback: if old format, distribute meetings/issues into changes
  if(!out.changes.length && (s.meetings||[]).length) out.tasks.push(...s.meetings.map(m=>'📅 '+m));
  if(!out.changes.length && (s.issues||[]).length) out.changes.push(...s.issues.map(i=>'⚠️ '+i));
  return out;
}

function renderHero(logs){
  const today = new Date().toISOString().slice(0,10);
  const log = logs.find(l=>l.date===today);
  const el = document.getElementById('today-hero');
  if(!log){el.innerHTML=`<div class="hero"><div class="hero-date">📅 Today - ${today}</div><div class="hero-tldr" style="color:var(--muted)">No entry yet - your daily summary will appear here at 21:15</div></div>`;return}
  const secs = buildSections(log);
  let secHtml = '';
  Object.entries(SEC_CONFIG).forEach(([key,cfg])=>{
    const items = secs[key]||[];
    if(!items.length) return;
    secHtml+=`<div class="hero-section ${cfg.cls}"><h4>${cfg.icon} ${cfg.title}</h4><ul>${items.map(i=>'<li>'+esc(i)+'</li>').join('')}</ul></div>`;
  });
  el.innerHTML = `<div class="hero">
    <div class="hero-date">📅 Today - ${log.date}</div>
    <div class="hero-tldr">${esc(log.summary)}</div>
    <div class="hero-sections">${secHtml||'<p style="color:var(--muted)">Sections will populate at end of day</p>'}</div>
  </div>`;
}

function renderDayCard(log){
  const secs = buildSections(log);
  let tags = '';
  Object.entries(SEC_CONFIG).forEach(([key,cfg])=>{
    if((secs[key]||[]).length) tags+=`<span class="tag ${cfg.tag}">${cfg.tagLabel}</span>`;
  });
  let bodyHtml = '';
  Object.entries(SEC_CONFIG).forEach(([key,cfg])=>{
    const items = secs[key]||[];
    if(!items.length) return;
    bodyHtml+=`<div class="section ${cfg.cls}"><h4>${cfg.icon} ${cfg.title}</h4><ul>${items.map(i=>'<li>'+esc(i)+'</li>').join('')}</ul></div>`;
  });
  if(log.raw_md){
    const rawId = 'raw-'+log.date;
    bodyHtml+=`<button class="raw-toggle" onclick="document.getElementById('${rawId}').style.display=document.getElementById('${rawId}').style.display==='block'?'none':'block'">📄 Toggle raw notes</button><div class="raw-block" id="${rawId}">${esc(log.raw_md)}</div>`;
  }
  var allTxt = JSON.stringify(log).toLowerCase();
  return `<div class="day-card" >
    <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <div class="day-top-row"><span class="day-date">${log.date}</span><span class="day-chevron">▼</span></div>
      <div class="day-tldr">${esc((log.summary||'').substring(0,140))}</div>
      <div class="day-tags">${tags}</div>
    </div>
    <div class="day-body">${bodyHtml}</div>
  </div>`;
}

function renderTimeline(logs){
  const el = document.getElementById('timeline');
  const past = logs.filter(l=>l.date!==new Date().toISOString().slice(0,10));
  el.innerHTML = past.length
    ? past.map(l=>renderDayCard(l)).join('')
    : '<div style="color:var(--muted);text-align:center;padding:40px">Your growth diary starts here. First entry at 21:15 tonight.</div>';
}

}

function renderAll(d){
